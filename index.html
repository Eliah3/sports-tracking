<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0d;
      --s1: #141416;
      --s2: #1b1b1e;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.1);
      --text: #eeebe6;
      --muted: #5a5956;
      --push: #e07a4f;
      --pull: #4fa8d5;
      --legs: #6dcc76;
      --r: 10px;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1.25rem 5rem; }
    .hdr { max-width: 1080px; margin: 0 auto 2rem; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
    .hdr-title { font-family: var(--mono); font-size: 0.95rem; letter-spacing: 0.12em; text-transform: uppercase; }
    .hdr-range { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); }
    .wrap { max-width: 1080px; margin: 0 auto; }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 2rem; }
    .metric { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.1rem; }
    .mlabel { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.35rem; }
    .mval { font-family: var(--mono); font-size: 1.8rem; font-weight: 300; line-height: 1; }
    .msub { font-size: 0.68rem; color: var(--muted); margin-top: 0.3rem; }
    .slabel { font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin: 2rem 0 0.6rem; }
    .card { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); padding: 1.1rem 1.3rem; }
    .cons-inner { position: relative; height: 190px; }
    .tabs { display: flex; gap: 6px; margin: 2rem 0 1.25rem; }
    .tab { font-family: var(--mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 5px 16px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.12s; }
    .tab:hover { color: var(--text); border-color: var(--border2); }
    .tab.tp { background: rgba(224,122,79,0.12); border-color: var(--push); color: var(--push); }
    .tab.tl { background: rgba(79,168,213,0.12); border-color: var(--pull); color: var(--pull); }
    .tab.tg { background: rgba(109,204,118,0.12); border-color: var(--legs); color: var(--legs); }
    .exgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 12px; }
    .excard { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.1rem 1.1rem; }
    .excard-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.65rem; }
    .excard-name { font-size: 0.82rem; font-weight: 500; margin-bottom: 0.4rem; }
    .excard-meta { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); text-align: right; line-height: 1.5; }
    .excard-chart { position: relative; height: 100px; }
    .excard-foot { margin-top: 0.55rem; font-family: var(--mono); font-size: 0.65rem; color: var(--muted); display: flex; gap: 1rem; flex-wrap: wrap; }
    .excard-foot strong { color: var(--text); font-weight: 500; }
    .ap .excard-name { color: var(--push); }
    .al .excard-name { color: var(--pull); }
    .ag .excard-name { color: var(--legs); }
    #loading { display: flex; align-items: center; justify-content: center; height: 60vh; font-family: var(--mono); font-size: 0.78rem; color: var(--muted); letter-spacing: 0.1em; }
    #app { display: none; }
    @media (max-width: 580px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .exgrid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="loading">Lade Workouts…</div>
<div id="app">
  <header class="hdr">
    <span class="hdr-title">Workout</span>
    <span class="hdr-range" id="hdr-range">–</span>
  </header>
  <div class="wrap">
    <div class="metrics">
      <div class="metric"><div class="mlabel">Sessions</div><div class="mval" id="m-sess">–</div><div class="msub">Workouts gesamt</div></div>
      <div class="metric"><div class="mlabel">Streak</div><div class="mval" id="m-streak">–</div><div class="msub">Tage am Stück</div></div>
      <div class="metric"><div class="mlabel">Diese Woche</div><div class="mval" id="m-week">–</div><div class="msub">Sessions</div></div>
      <div class="metric"><div class="mlabel">Letztes</div><div class="mval" id="m-last" style="font-size:1rem;padding-top:0.5rem">–</div><div class="msub" id="m-last-type">–</div></div>
    </div>

    <div class="slabel">Consistency — Sessions pro Woche</div>
    <div class="card"><div class="cons-inner"><canvas id="c-cons" role="img" aria-label="Gestapeltes Balkendiagramm Workouts pro Woche"></canvas></div></div>

    <div class="tabs">
      <button class="tab tp" data-c="push" onclick="showCat('push')">Push</button>
      <button class="tab"    data-c="pull" onclick="showCat('pull')">Pull</button>
      <button class="tab"    data-c="legs" onclick="showCat('legs')">Legs</button>
    </div>
    <div class="exgrid" id="exgrid"></div>
  </div>
</div>

<script>
/* ── Trainingsplan: Plan-Übungen → mögliche CSV-Namen ─────────────────────── */
const PLAN = {
  push: [
    { id: 'liegestuetze', name: 'Liegestütze',      csvNames: ['Push Up','Wand-Liegestütze','Erhöhte Liegestütze'] },
    { id: 'decline',      name: 'Decline',           csvNames: ['Decline Push Ups','Decline Push-ups','Decline Liegestütze'] },
    { id: 'schulter',     name: 'Pike / Schulter',   csvNames: ['Pike Push Ups','Pike Push-ups','Pike Push-Up'] },
    { id: 'trizeps',      name: 'Diamond / Trizeps', csvNames: ['Diamond Push Up','Diamond Push-Up','Diamond Push-ups'] },
  ],
  pull: [
    { id: 'ruder',    name: 'Rudermaschine',         isTime: true, csvNames: ['Rudergerät Time','Rudergerät','Rowing','Rudergerät Zeit'] },
    { id: 'klimmzug', name: 'Klimmzüge (Übergriff)',               csvNames: ['Pull Up','Pull-Up','Klimmzug'] },
    { id: 'chinup',   name: 'Chin-ups (Untergriff)',               csvNames: ['Chin Up','Chin-Up','Chinup'] },
    { id: 'griffkraft', name: 'Pull Up Hang', isTime: true,
      csvNames: ['Pull Up Hang Dauer','Pull Up Hang'] },
    { id: 'shrug', name: 'Shrug',
      csvNames: ['Shrug (Barbell)','Shrug','Farmers Carries','Farmers Carries Zeit'] },
  ],
  legs: [
    { id: 'stepups', name: 'Step-ups',
      csvNames: ['Step-up','Step Up','Step-Up'] },
    { id: 'rdl', name: 'Romanian Deadlift',
      csvNames: ['Romanian Deadlift (Barbell)','RDL','Romanian Deadlift'] },
    { id: 'glutes', name: 'Glute Bridges',
      csvNames: ['Glute Bridges','Glute Bridge','Hip Thrust'] },
    { id: 'nordic', name: 'Nordic Curls',
      csvNames: ['Nordic Curl','Nordic Curls','Nordische Kniebeuge'] },
    { id: 'calf', name: 'Calf Raises',
      csvNames: ['Calf Raise','Calf Raises','Standing Calf Raise','Wade'] },
  ],
};

const COLORS = { push:'#e07a4f', pull:'#4fa8d5', legs:'#6dcc76' };
const DIM    = { push:'rgba(224,122,79,0.14)', pull:'rgba(79,168,213,0.14)', legs:'rgba(109,204,118,0.14)' };
const ACCENT = { push:'tp', pull:'tl', legs:'tg' };
const chartReg = {};

Chart.defaults.color = '#5a5956';
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.font.size = 10;

function getCat(w) {
  const u = w.toUpperCase();
  if (u.includes('PUSH')) return 'push';
  if (u.includes('PULL')) return 'pull';
  if (u.includes('LEG'))  return 'legs';
  return null;
}

function weekKey(dateStr) {
  const d = new Date(dateStr);
  const dow = d.getDay() === 0 ? 6 : d.getDay() - 1;
  const m = new Date(d); m.setDate(d.getDate() - dow);
  return m.toISOString().split('T')[0];
}

function isSunday(dateStr) { return new Date(dateStr).getDay() === 0; }

function destroyChart(id) { if (chartReg[id]) { chartReg[id].destroy(); delete chartReg[id]; } }

/* ── CSV parser ── */
function parseCSV(text) {
  const rows = [];
  for (const line of text.trim().split('\n').slice(1)) {
    const cols = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    const setVal = (cols[4]||'').replace(/"/g,'').trim();
    if (setVal === 'Ruhezeit' || setVal === '') continue;
    const date = (cols[0]||'').split(' ')[0];
    if (!date || date < '2026-04-01') continue;
    const exercise = (cols[3]||'').replace(/"/g,'').trim();
    if (!exercise) continue;
    rows.push({
      date,
      workout: (cols[1]||'').replace(/"/g,'').trim().toUpperCase(),
      exercise,
      reps: parseFloat(cols[6])||0,
      secs: parseFloat(cols[8])||0,
    });
  }
  return rows;
}

/* ── Main ── */
async function init() {
  let text;
  try {
    const r = await fetch('strong_workouts.csv');
    if (!r.ok) throw 0;
    text = await r.text();
  } catch {
    document.getElementById('loading').textContent = 'Fehler: strong_workouts.csv nicht gefunden.';
    return;
  }

  const rows = parseCSV(text);
  const sessSet = new Set(rows.map(r => r.date+'|'+r.workout));
  const sessions = [...sessSet].map(s => ({ date: s.split('|')[0], workout: s.split('|')[1] }));
  const days = [...new Set(sessions.map(s => s.date))].sort();

  /* Streak – Sonntag zählt als Ruhetag (+1), aber kein Training nötig.
     Erlaubte Lücken: 1 Tag (normaler Ruhetag) ODER Sonntag wird übersprungen (diff=2, gap=Sonntag).
     Außerdem: Sonntage in der Trainings-Tage-Liste erhalten +1 ohne Training. */
  let streak = 0;
  if (days.length) {
    const today = new Date().toISOString().split('T')[0];
    const yest  = new Date(Date.now()-86400000).toISOString().split('T')[0];
    const last  = days[days.length-1];
    // Streak gilt als aktiv wenn heute oder gestern trainiert wurde,
    // oder wenn gestern Sonntag war und vorgestern trainiert wurde
    const sun2 = new Date(Date.now()-172800000).toISOString().split('T')[0];
    const active = last===today || last===yest || (isSunday(yest) && last===sun2);
    if (active) {
      // Zähle Tage inkl. Sonntage als Ruhetage
      // Iteriere rückwärts durch Trainingstage und zähle dazwischenliegende Sonntage mit
      streak = 1 + (isSunday(today) && last!==today ? 1 : 0);
      for (let i = days.length-2; i >= 0; i--) {
        const a = new Date(days[i+1]), b = new Date(days[i]);
        const diff = (a-b)/86400000;
        const gapDate = new Date(b.getTime()+86400000).toISOString().split('T')[0];
        if (diff===1) { streak++; }
        else if (diff===2 && isSunday(gapDate)) { streak += 2; } // Trainingstag + Sonntag
        else break;
      }
    }
  }

  /* Diese Woche */
  const thisWeek = weekKey(new Date().toISOString().split('T')[0]);
  const weekSess = sessions.filter(s => weekKey(s.date)===thisWeek).length;
  const lastSess = sessions[sessions.length-1];

  if (days.length >= 2) {
    const fmt = d => new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'2-digit'});
    document.getElementById('hdr-range').textContent = fmt(days[0])+' – '+fmt(days[days.length-1]);
  }

  document.getElementById('m-sess').textContent   = sessions.length;
  document.getElementById('m-streak').textContent = streak;
  document.getElementById('m-week').textContent   = weekSess;
  if (lastSess) {
    document.getElementById('m-last').textContent      = new Date(lastSess.date).toLocaleDateString('de-DE',{day:'2-digit',month:'short'});
    document.getElementById('m-last-type').textContent = lastSess.workout;
  }

  /* Consistency chart */
  const weekMap = {};
  sessions.forEach(s => {
    const wk = weekKey(s.date);
    if (!weekMap[wk]) weekMap[wk] = {push:0,pull:0,legs:0};
    const cat = getCat(s.workout);
    if (cat) weekMap[wk][cat]++;
  });
  const weeks = Object.keys(weekMap).sort();
  chartReg['cons'] = new Chart(document.getElementById('c-cons'), {
    type:'bar',
    data:{
      labels: weeks.map(w => new Date(w).toLocaleDateString('de-DE',{day:'2-digit',month:'short'})),
      datasets:[
        {label:'Push', data:weeks.map(w=>weekMap[w].push), backgroundColor:'#e07a4f', borderRadius:3, stack:'a'},
        {label:'Pull', data:weeks.map(w=>weekMap[w].pull), backgroundColor:'#4fa8d5', borderRadius:3, stack:'a'},
        {label:'Legs', data:weeks.map(w=>weekMap[w].legs), backgroundColor:'#6dcc76', borderRadius:3, stack:'a'},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'top',align:'end',labels:{boxWidth:10,boxHeight:10,useBorderRadius:true,borderRadius:2,padding:14,font:{size:10}}},
        tooltip:{mode:'index'}
      },
      scales:{
        x:{stacked:true,grid:{display:false},ticks:{autoSkip:true,maxTicksLimit:12,maxRotation:0}},
        y:{stacked:true,beginAtZero:true,ticks:{stepSize:1},grid:{color:'rgba(255,255,255,0.04)'}}
      }
    }
  });

  window._rows = rows;
  showCat('push');
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

/* ── Exercise cards ── */
function showCat(cat) {
  document.querySelectorAll('.tab').forEach(t => {
    t.className = 'tab';
    if (t.dataset.c === cat) t.classList.add(ACCENT[cat]);
  });
  Object.keys(chartReg).forEach(id => { if (id!=='cons') destroyChart(id); });

  const grid = document.getElementById('exgrid');
  grid.innerHTML = '';
  const rows = window._rows;
  const color = COLORS[cat];
  const dim   = DIM[cat];

  PLAN[cat].forEach(planEx => {
    const exRows = rows.filter(r => {
      const en = r.exercise.toLowerCase();
      return planEx.csvNames.some(n => en === n.toLowerCase() || en.includes(n.toLowerCase()) || n.toLowerCase().includes(en));
    });
    if (!exRows.length) return;

    const useTime = planEx.isTime || (exRows.every(r=>r.reps===0) && exRows.some(r=>r.secs>0));
    const metric  = r => useTime ? r.secs : r.reps;
    const unit    = useTime ? 's' : ' Wdh';

    /* Per date: best value + which variant was used */
    const byDate = {};
    exRows.forEach(r => {
      const v = metric(r);
      if (v <= 0) return;
      if (!byDate[r.date] || v > byDate[r.date].val)
        byDate[r.date] = { val: v, variant: r.exercise };
    });

    const dates = Object.keys(byDate).sort();
    if (!dates.length) return;

    const values  = dates.map(d => byDate[d].val);
    const best    = Math.max(...values);
    const latest  = values[values.length-1];
    const prev    = values.length>=2 ? values[values.length-2] : null;
    const arrow   = prev!==null ? (latest>prev?'↑':latest<prev?'↓':'→') : '';

    const cardId = 'chart-'+planEx.id;
    const card = document.createElement('div');
    card.className = 'excard '+(cat==='push'?'ap':cat==='pull'?'al':'ag');
    card.innerHTML = `
      <div class="excard-top">
        <div class="excard-name">${planEx.name}</div>
        <div class="excard-meta">${dates.length} Sessions<br>${useTime?'Zeit (s)':'Wdh'}</div>
      </div>
      <div class="excard-chart"><canvas id="${cardId}" role="img" aria-label="Progression ${planEx.name}"></canvas></div>
      <div class="excard-foot">
        <span>Best <strong>${Math.round(best)}${unit}</strong></span>
        <span>Zuletzt <strong>${Math.round(latest)}${unit}</strong> ${arrow}</span>
      </div>`;
    grid.appendChild(card);

    requestAnimationFrame(() => {
      const ctx = document.getElementById(cardId);
      if (!ctx) return;
      chartReg[cardId] = new Chart(ctx, {
        type:'line',
        data:{
          labels: dates.map(d => new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'short'})),
          datasets:[{
            data:values,
            borderColor:color,
            backgroundColor:dim,
            fill:true,
            tension:0.35,
            pointRadius: dates.length<=8?3:2,
            pointBackgroundColor:color,
            borderWidth:1.5,
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>Math.round(c.parsed.y)+unit}}},
          scales:{
            x:{grid:{display:false},ticks:{autoSkip:true,maxTicksLimit:5,maxRotation:0,font:{size:9}}},
            y:{beginAtZero:false,ticks:{maxTicksLimit:4,font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}}
          }
        }
      });
    });
  });

  if (!grid.children.length)
    grid.innerHTML = `<div style="font-family:var(--mono);font-size:0.72rem;color:var(--muted);padding:1.5rem 0">Noch keine ${cat.toUpperCase()} Daten ab April 2026.</div>`;
}

init();
</script>
</body>
</html>
